name: Actualizar polla

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 min (mínimo de GitHub Actions)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Loop cada ~1 minuto (5 iteraciones)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            echo "=== Iteración $i ($(date -u '+%H:%M:%S UTC')) ==="
            python scraper.py && {
              git add index.html scraped_data.json 2>/dev/null || true
              if ! git diff --cached --quiet; then
                git commit -m "🤖 Auto-update $i/5 $(date -u '+%H:%M UTC')"
                git push
                echo "✓ Pushed iteración $i"
              else
                echo "Sin cambios en iteración $i"
              fi
            } || echo "⚠️ Scraper falló en iteración $i, continuando..."
            [ $i -lt 5 ] && sleep 60
          done
          exit 0
